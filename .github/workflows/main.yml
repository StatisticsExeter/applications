name: CI

on:
  push:
    branches: [ main, python_private ]
  pull_request:
    branches: [ main, python_private ]

jobs:
  test:
    if: ${{(github.repository == 'phewson/mthm503' && github.ref == 'refs/heads/python_private') || (github.repository != 'phewson/mthm503' && github.ref == 'refs/heads/main')}}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniconda-version: 'latest'
          mamba-version: "*"
          use-mamba: true
          channels: conda-forge
          environment-file: environment.yml
          activate-environment: python-exercises

      # --- INTRO TOPIC ---
      - name: Run tests for intro topic
        continue-on-error: true
        id: intro_test
        run: |
          set -o pipefail
          conda run -n python-exercises pytest course/intro/tests --ignore=intro/tests/test_db_connection.py | tee intro_tests_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run flake8 for intro
        continue-on-error: true
        id: intro_lint
        run: |
          set -o pipefail
          conda run -n python-exercises flake8 course/intro | tee intro_flake8_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run pipeline for intro
        continue-on-error: true
        id: intro_dvc_demo
        run: |
          set -o pipefail
          conda run -n python-exercises dvc repro intro_demo | tee intro_dvc_demo_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      # --- REGRESSION ---
      - name: Run tests for regression
        continue-on-error: true
        id: reg_test
        run: |
          set -o pipefail
          conda run -n python-exercises pytest course/regression | tee regression_tests_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run flake8 for regression
        continue-on-error: true
        id: reg_lint
        run: |
          set -o pipefail
          conda run -n python-exercises flake8 course/regression | tee regression_flake8_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      # --- SUPERVISED ---
      - name: Run tests for supervised
        continue-on-error: true
        id: sup_test
        run: |
          set -o pipefail
          conda run -n python-exercises pytest course/supervised_classification | tee supervised_tests_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run flake8 for supervised
        continue-on-error: true
        id: sup_lint
        run: |
          set -o pipefail
          conda run -n python-exercises flake8 course/supervised_classification | tee supervised_flake8_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      # --- UNSUPERVISED ---
      - name: Run tests for unsupervised
        continue-on-error: true
        id: unsup_test
        run: |
          set -o pipefail
          conda run -n python-exercises pytest course/unsupervised_classification | tee unsupervised_tests_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run flake8 for unsupervised
        continue-on-error: true
        id: unsup_lint
        run: |
          set -o pipefail
          conda run -n python-exercises flake8 course/unsupervised_classification | tee unsupervised_flake8_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run flake8 for scripts
        continue-on-error: true
        id: scripts
        run: |
          set -o pipefail
          conda run -n python-exercises flake8 course/scripts/*/*.py | tee script_flake8_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

          
      # --- SUMMARY DASHBOARD ---
      - name: Generate Summary Dashboard
        if: always()
        run: |
          function test_emoji() {
            code="$1"
            if [ "$code" == "0" ]; then
              echo "🟢 Pass"
            elif [ "$code" == "1" ]; then
              echo "🟠 Test failures"
            elif [ "$code" == "" ]; then
              echo "🔴 Did not run"
            else
              echo "🔴 Pytest error ($code)"
            fi
           }
 
          function lint_emoji() {
            code="$1"
            if [ "$code" == "0" ]; then
              echo "🟢 Pass"
            elif [ "$code" == "" ]; then
              echo "🔴 Did not run"
            else
              echo "🟠 Issues"
            fi
          }


          echo "## Coursework Status Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Intro Tests** | $(test_emoji ${{ steps.intro_test.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Intro Lint** | $(lint_emoji ${{ steps.intro_lint.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Intro DVC** | $(lint_emoji ${{ steps.intro_dvc_demo.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Regression Tests** | $(test_emoji ${{ steps.reg_test.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Regression Lint** | $(lint_emoji ${{ steps.reg_lint.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Supervised Tests** | $(test_emoji ${{ steps.sup_test.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Supervised Lint** | $(lint_emoji ${{ steps.sup_lint.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Unsupervised Tests** | $(test_emoji ${{ steps.unsup_test.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Unsupervised Lint** | $(lint_emoji ${{ steps.unsup_lint.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Scripts Lint** | $(lint_emoji ${{ steps.scripts.outputs.exit_code }}) |" >> $GITHUB_STEP_SUMMARY

# --- PDF REPORT GENERATION ---
      # We bring back your collation logic here
      - name: Generate Collated PDF Reports
        if: always()
        run: |
          pip install pymupdf
          python .github_cw_report.py

      - name: Upload CI Report and Artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: actions_report
          path: |
            ci_report.pdf
            *_output.txt

# --- FINAL EVALUATION ---
      - name: Final Status Check
        if: always()
        run: |
          # This step actually fails the build if any status was non-zero 
          # so they still get a 'Red X' on the commit, but only at the very end.
          if [[ "${{ steps.intro_test.outputs.exit_code }}" != "0" || \
                "${{ steps.intro_lint.outputs.exit_code }}" != "0" || \
                "${{ steps.reg_test.outputs.exit_code }}" != "0" || \
                "${{ steps.reg_lint.outputs.exit_code }}" != "0" || \
                "${{ steps.sup_test.outputs.exit_code }}" != "0" || \
                "${{ steps.sup_lint.outputs.exit_code }}" != "0" || \
                "${{ steps.unsup_test.outputs.exit_code }}" != "0" || \
                "${{ steps.unsup_lint.outputs.exit_code }}" != "0" || \
                "${{ steps.scripts.outputs.exit_code }}" != "0" ]]; then
                 echo "One or more tests failed. Please see your pdf for details"
            exit 1
          fi
  
